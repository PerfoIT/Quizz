services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: perfoquiz
      POSTGRES_PASSWORD: perfoquiz
      POSTGRES_DB: perfoquiz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perfoquiz -d perfoquiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://perfoquiz:perfoquiz@db:5432/perfoquiz}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      SERVER_PORT: ${SERVER_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-perfo-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@perfo.local}
      ADMIN_NAME: ${ADMIN_NAME:-Administrateur PERFO}
      AUTH_SECRET: ${AUTH_SECRET:-perfo-quiz-dev-secret}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
